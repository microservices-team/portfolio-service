server:
  port: 8182

spring:
  application:
    name: portfolio-service
  config:
    import: optional:configserver:http://${CONFIG_USER:configuser}:${CONFIG_PASS:configpass}@${CONFIG_HOST:localhost}:8888
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/diegoanyosa_db?currentSchema=portfolio}
    username: ${DB_USER:dauser}
    password: ${DB_PASS:change-me-strong-password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        default_schema: portfolio
  flyway:
    enabled: true
    schemas: portfolio
    locations: classpath:db/migration
    baseline-on-migrate: true

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_HOST:localhost}:8761/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:change-me-in-production-minimum-32-chars-long!}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
